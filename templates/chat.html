<!DOCTYPE html>
<html>
<head>

<title>Enterprise Chat Platform</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

<style>

body{
    background:#f4f6f9;
}

#chat-box{
    height:450px;
    overflow-y:auto;
    background:white;
    padding:15px;
    border-radius:10px;
    border:1px solid #ddd;
}

.msg{
    padding:10px;
    margin:5px;
    background:#e9ecef;
    border-radius:10px;
}

.dark{
    background:#121212;
    color:white;
}

.dark #chat-box{
    background:#1e1e1e;
    color:white;
}

</style>

</head>

<body class="container mt-4">

<div class="d-flex justify-content-between mb-3">

<h3>💬 Enterprise Chat Platform</h3>

<div>

<button
class="btn btn-dark me-2"
onclick="toggleDarkMode()">

🌙

</button>

<button
class="btn btn-danger"
onclick="logout()">

Logout

</button>

</div>

</div>

<select id="roomSelect" class="form-select mb-3">

<option value="general">General</option>
<option value="python">Python</option>
<option value="java">Java</option>
<option value="placement">Placement</option>

</select>

<div class="row">

<div class="col-md-8">

<div id="chat-box"></div>

<div id="typing-status" class="mt-2 text-secondary"></div>

<div class="input-group mt-3">

<input
id="msg"
class="form-control"
placeholder="Type message">

<button
class="btn btn-primary"
onclick="sendMessage()">

Send

</button>

</div>

</div>

<div class="col-md-4">

<div class="card">

<div class="card-body">

<h5>Online Users</h5>

<ul id="users"></ul>

</div>

</div>

</div>

</div>

<script>

if(!localStorage.getItem("token")){
    window.location.href="/";
}

var socket = io();

var username =
localStorage.getItem("username");

var room =
document.getElementById(
"roomSelect"
).value;

async function loadMessages(){

    let res =
    await fetch("/messages/" + room);

    let data =
    await res.json();

    document.getElementById(
    "chat-box"
    ).innerHTML="";

    data.forEach(msg => {

        document.getElementById(
        "chat-box"
        ).innerHTML +=

        `<div class="msg">
            ${msg.sender}: ${msg.message}
        </div>`;

    });

}

socket.emit("join",{
    username,
    room
});

loadMessages();

socket.on("message",function(msg){

    document.getElementById(
    "chat-box"
    ).innerHTML +=

    `<div class="msg">${msg}</div>`;

});

socket.on("users",function(users){

    document.getElementById(
    "users"
    ).innerHTML =

    users.map(
    user => `<li>${user}</li>`
    ).join("");

});

socket.on("typing",function(data){

    document.getElementById(
    "typing-status"
    ).innerText =
    data.username + " is typing...";

    setTimeout(function(){

        document.getElementById(
        "typing-status"
        ).innerText = "";

    },1000);

});

document.getElementById(
"msg"
).addEventListener(
"input",
function(){

    socket.emit(
    "typing",
    {
        username,
        room
    });

});

document.getElementById(
"roomSelect"
).addEventListener(
"change",
function(){

    room = this.value;

    socket.emit(
    "join",
    {
        username,
        room
    });

    loadMessages();

});

function sendMessage(){

    let msg =
    document.getElementById(
    "msg"
    ).value;

    if(msg.trim()===""){
        return;
    }

    socket.emit(
    "message",
    {
        username,
        room,
        message:msg
    });

    document.getElementById(
    "msg"
    ).value="";

}

function logout(){

    localStorage.removeItem(
    "token"
    );

    localStorage.removeItem(
    "username"
    );

    window.location.href="/";

}

function toggleDarkMode(){

    document.body.classList.toggle(
    "dark"
    );

}

</script>

</body>
</html>
